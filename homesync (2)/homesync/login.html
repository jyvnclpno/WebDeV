<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HomeSync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div style="text-align: center; margin-bottom: 20px;">
        <a href="index.html" style="font-size: 20px; font-weight: bold; color: #2563eb; text-decoration: none;">🏠 HomeSync</a>
      </div>

      <h2>Welcome back!</h2>
      <p class="auth-sub">No account yet? <a href="signup.html">Sign up free</a></p>

      <p style="font-size: 12px; font-weight: bold; color: #555; margin-bottom: 7px;">Sign in as:</p>
      <div class="role-sel">
        <div class="role-opt selected" id="role-landlord" onclick="pickRole('landlord')">🏠 Landlord</div>
        <div class="role-opt" id="role-tenant" onclick="pickRole('tenant')">👤 Tenant</div>
      </div>

      <div class="social-btn" style="margin-bottom: 11px;">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="16" height="16" alt="Google">
        Continue with Google
      </div>

      <div class="divider">— or sign in with email —</div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <div class="forgot-link">
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <button class="btn-full" onclick="loginRoute()">Sign in</button>

      <p style="text-align: center; font-size: 12px; color: #aaa; margin-top: 10px;">
        By signing in you agree to our <a href="#" style="color: #2563eb;">Terms</a> and <a href="#" style="color: #2563eb;">Privacy Policy</a>
      </p>

      <p style="text-align: center; font-size: 12px; margin-top: 14px;">
        <a href="index.html" style="color: #2563eb;">← Back to home</a>
      </p>

    </div>
  </div>

  <script>
    var selectedRole = 'landlord';

    function pickRole(role) {
      selectedRole = role;
      document.getElementById('role-landlord').className = role === 'landlord' ? 'role-opt selected' : 'role-opt';
      document.getElementById('role-tenant').className = role === 'tenant' ? 'role-opt selected' : 'role-opt';
    }

    function loginRoute() {
      if (selectedRole === 'tenant') {
        location.href = 'tenant-dashboard.html';
      } else {
        location.href = 'landlord-dashboard.html';
      }
    }
  </script>

</body>
</html>
