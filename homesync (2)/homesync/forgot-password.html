<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — HomeSync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div style="text-align: center; margin-bottom: 20px;">
        <a href="index.html" style="font-size: 20px; font-weight: bold; color: #2563eb; text-decoration: none;">🏠 HomeSync</a>
      </div>

      <!-- Step 1: Enter email -->
      <div id="step1">
        <div style="text-align: center; font-size: 48px; margin-bottom: 16px;">🔒</div>
        <h2>Forgot your password?</h2>
        <p class="auth-sub">Enter your email and we'll send a reset code.</p>

        <div class="form-group">
          <label>Email address *</label>
          <input type="email" id="email-input" placeholder="you@example.com">
        </div>

        <button class="btn-full" onclick="goToStep2()">Send reset code</button>

        <p style="text-align: center; margin-top: 12px; font-size: 12px;">
          <a href="login.html" style="color: #2563eb;">← Back to login</a>
        </p>
      </div>

      <!-- Step 2: Enter OTP + new password -->
      <div id="step2" style="display: none;">
        <div style="text-align: center; font-size: 48px; margin-bottom: 16px;">📬</div>
        <h2>Check your email</h2>
        <p class="auth-sub">We sent a 6-digit code to <strong id="email-show"></strong></p>

        <div class="otp-row">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 1)">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 2)">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 3)">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 4)">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 5)">
          <input class="otp-in" maxlength="1" oninput="nextOtp(this, 6)">
        </div>

        <p style="text-align: center; font-size: 12px; color: #aaa; margin-bottom: 16px;">
          Didn't get it? <a href="#" style="color: #2563eb;" onclick="showToast('Code resent!', 'success')">Resend code</a>
        </p>

        <div class="form-group">
          <label>New password *</label>
          <input type="password" placeholder="Minimum 8 characters">
        </div>

        <div class="form-group">
          <label>Confirm new password *</label>
          <input type="password" placeholder="Repeat password">
        </div>

        <button class="btn-full" onclick="location.href='login.html'">Reset password</button>

        <p style="text-align: center; margin-top: 12px; font-size: 12px;">
          <a href="#" onclick="goBack()" style="color: #2563eb;">← Change email</a>
        </p>
      </div>

    </div>
  </div>

  <div id="toast-wrap"></div>

  <script>
    function goToStep2() {
      var email = document.getElementById('email-input').value || 'your@email.com';
      document.getElementById('email-show').textContent = email;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    }

    function goBack() {
      document.getElementById('step1').style.display = 'block';
      document.getElementById('step2').style.display = 'none';
    }

    function nextOtp(input, index) {
      if (input.value.length === 1 && index < 6) {
        var all = document.querySelectorAll('.otp-in');
        all[index].focus();
      }
    }

    function showToast(message, type) {
      var wrap = document.getElementById('toast-wrap');
      var t = document.createElement('div');
      t.className = 'toast' + (type ? ' ' + type : '');
      t.textContent = message;
      wrap.appendChild(t);
      setTimeout(function() {
        t.style.opacity = '0';
        t.style.transition = 'opacity 0.3s';
        setTimeout(function() { t.remove(); }, 300);
      }, 3000);
    }
  </script>

</body>
</html>
