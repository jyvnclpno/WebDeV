<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — HomeSync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a class="logo" href="index.html">Home<span>Sync</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#">About Us</a>
      <a href="#">Contacts</a>
    </div>
    <div>
      <button class="btn-login" onclick="location.href='login.html'">Login</button>
      <button class="btn-signup" onclick="location.href='signup.html'">Sign Up</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <h2>Create your account</h2>
      <p class="auth-sub">Already have an account? <a href="login.html">Sign in</a></p>

      <p style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">I am a:</p>
      <div class="role-sel">
        <div class="role-opt selected" id="role-landlord" onclick="pickRole('landlord')">
          🏠 Landlord<br>
          <small style="font-weight: normal; color: #64748b;">I own property</small>
        </div>
        <div class="role-opt" id="role-tenant" onclick="pickRole('tenant')">
          👤 Tenant<br>
          <small style="font-weight: normal; color: #64748b;">I rent property</small>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First name *</label>
          <input type="text" placeholder="Juan">
        </div>
        <div class="form-group">
          <label>Last name *</label>
          <input type="text" placeholder="dela Cruz">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" placeholder="Minimum 8 characters">
      </div>

      <div class="form-group" style="display: flex; align-items: flex-start; gap: 8px;">
        <input type="checkbox" id="terms" checked style="width: auto; margin-top: 3px; accent-color: #22c55e;">
        <label for="terms" style="font-size: 12px; color: #94a3b8; font-weight: normal;">
          I agree to the <a href="#" style="color: #22c55e;">Terms</a> and <a href="#" style="color: #22c55e;">Privacy Policy</a>
        </label>
      </div>

      <button class="btn-green-full" onclick="signupRoute()">Create account</button>

      <div class="divider">— or —</div>

      <div class="social-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="16" height="16" alt="Google">
        Continue with Google
      </div>

      <a class="back-link" href="index.html">← Back to home</a>

    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Support</a>
    </div>
    <p>© 2026 HomeSync Management System. All rights reserved.</p>
  </footer>

  <script>
    var selectedRole = 'landlord';

    function pickRole(role) {
      selectedRole = role;
      document.getElementById('role-landlord').className = role === 'landlord' ? 'role-opt selected' : 'role-opt';
      document.getElementById('role-tenant').className = role === 'tenant' ? 'role-opt selected' : 'role-opt';
    }

    function signupRoute() {
      if (selectedRole === 'tenant') {
        location.href = 'tenant-dashboard.html';
      } else {
        location.href = 'landlord-dashboard.html';
      }
    }
  </script>

</body>
</html>
